{% extends 'base.html' %}
{% block body %}
<div class="container mt-4">

    {% for post in posts %}
    {% if post.image %}
    <img src="{{ post.image.url }}" alt="Post Image" width="200"><br>
    <br>
    {% endif %}
    Title = {{post.title|truncatewords:4}}<br>
    {{post.author.username}} at {{post.created_at}}<br>
    Content = {{post.content|truncatewords:4}}<br>
    <a href="{% url 'post_detail' post.id %}">Read More</a><br>
    <br>
    {% endfor %}
</div>
{% endblock body %}
